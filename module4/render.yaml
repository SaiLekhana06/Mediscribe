services:
  - type: web
    name: mediscribe-api
    runtime: python
    rootDir: module4
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_lg
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: GEMINI_API_KEY
        sync: false
      - key: AUDIO_UPLOAD_DIR
        value: ./uploaded_audio
      - key: PYTHON_VERSION
        value: "3.11.9"
